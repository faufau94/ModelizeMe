# =============================================
#  Moldata - Docker Compose
# =============================================
#  Services: app, websocket, mysql, redis, phpmyadmin
#
#  Usage:
#    cp .env.example .env       # edit values
#    docker compose up -d --build
#    docker compose logs -f app
# =============================================

services:
  # ─── MySQL 8 ──────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - moldata
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # ─── Redis 7 ──────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - moldata
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ─── Nuxt Application ────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3100}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      NUXT_AUTH_ORIGIN: http://localhost:3100
      NUXT_BASE_URL: http://localhost:3100/api/auth
      BASE_URL: http://localhost:3100
      BETTER_AUTH_URL: ${BASE_URL}
      # Backend
      URL_BACKEND: ${URL_BACKEND}
      # OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Email
      MAILER_HOST: ${MAILER_HOST}
      MAILER_PORT: ${MAILER_PORT}
      MAILER_USER: ${MAILER_USER}
      MAILER_PASSWORD: ${MAILER_PASSWORD}
      MAILER_FROM: ${MAILER_FROM}
      # WebSocket (server-side uses internal Docker hostname, browser uses localhost)
      WEBSOCKET_URL: ws://websocket:1234
      NUXT_PUBLIC_WEBSOCKET_URL: ws://localhost:1234
      NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME:-Moldata}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      moldata:
      moldata-generator:
        aliases:
          - moldata-app
    command: ["yarn", "dev"]

  # ─── WebSocket Server (y-websocket) ──────
  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    restart: unless-stopped
    ports:
      - "1234:1234"
    environment:
      HOST: 0.0.0.0
      PORT: 1234
      YPERSISTENCE: redis
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - ./server:/app/server
    entrypoint: []
    command: ["node", "--watch", "server/websocket-server.js"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - moldata

  # ─── MailHog (dev only) ──────────────────
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   restart: unless-stopped
  #   ports:
  #     - "1025:1025"   # SMTP
  #     - "8025:8025"   # Web UI
  #   networks:
  #     - moldata
  #   profiles:
  #     - dev

  # ─── phpMyAdmin (dev only) ───────────────
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - moldata
    profiles:
      - dev

# ─── Volumes ───────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ──────────────────────────────
networks:
  moldata:
    driver: bridge
  moldata-generator:
    external: true
    name: modelizemoi_network
